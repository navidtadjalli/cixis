name: Build مَجاز (Majaz) EXE

# Same pipeline as windows-build.yml (CiXiS) but for the Majaz brand, triggered
# by a separate tag namespace so the two products build independently.
#   CiXiS : tag  v*
#   Majaz : tag  m-v*   (this workflow)
# Neither publishes anywhere — each run's .exe is downloaded from its artifacts.
on:
  push:
    tags:
      - "m-v*"       # e.g. m-v1.0.0
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  build-majaz:
    runs-on: windows-latest
    env:
      BRAND: majaz

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Build embedded Python backend bundle
        run: python backend\build_win_python.py

      # m-v1.2.3 -> 1.2.3. Becomes the app version, so the built installer is
      # named "مَجاز Setup 1.2.3.exe". Manual runs leave it empty and fall back to
      # the version committed in package.json.
      - name: Derive version from tag
        shell: pwsh
        run: |
          $v = "${{ github.ref_name }}" -replace '^m-v',''
          if ("${{ github.ref }}" -notlike 'refs/tags/m-v*') { $v = '' }
          "APP_VERSION=$v" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      # Write the version into package.json rather than passing electron-builder
      # `-c.extraMetadata.version=X`: npm's own arg parser claims `-c` and splits
      # the value off, so electron-builder receives `.extraMetadata.version=X` as
      # a config *file path* and dies with ENOENT. electron-builder reads the app
      # version from package.json anyway; the committed value is a dev default.
      - name: Apply version from tag
        if: env.APP_VERSION != ''
        working-directory: frontend
        run: npm pkg set version=${{ env.APP_VERSION }}

      # electron:build:majaz regenerates the wine theme + مَ glyph (BRAND=majaz)
      # then builds with electron-builder.majaz.yml. Nothing is published: grab
      # the .exe from this run's artifacts below and install it by hand.
      - name: Build Majaz installer
        working-directory: frontend
        run: npm run electron:build:majaz

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: majaz-windows-installer
          path: frontend/release/*.exe
          if-no-files-found: error
