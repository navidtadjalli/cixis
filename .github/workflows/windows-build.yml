name: Build Windows EXE

# Builds the installer only — nothing is published and the app does not
# auto-update. Download the .exe from the run's artifacts and install it.
on:
  push:
    tags:
      - "v*"        # build on version tags, e.g. v1.0.0
  workflow_dispatch: {}   # also allow manual runs from the Actions tab

permissions:
  contents: read

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      # Build the self-contained Windows Python bundle electron-builder ships:
      #   backend/python-embed/  -> standalone embeddable CPython (no install needed)
      #   backend/pylibs/        -> Django + deps as win_amd64 wheels
      # A venv is NOT used: it references a base Python by absolute path, so it is
      # not portable to a PC without Python installed. See the script header.
      - name: Build embedded Python backend bundle
        run: python backend\build_win_python.py

      # v1.2.3 -> 1.2.3. Becomes the app version, so the built installer is named
      # "CiXiS Setup 1.2.3.exe". Manual runs leave it empty and fall back to the
      # version committed in package.json.
      - name: Derive version from tag
        shell: pwsh
        run: |
          $v = "${{ github.ref_name }}" -replace '^v',''
          if ("${{ github.ref }}" -notlike 'refs/tags/v*') { $v = '' }
          "APP_VERSION=$v" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      # Write the version into package.json rather than passing electron-builder
      # `-c.extraMetadata.version=X`: npm's own arg parser claims `-c` and splits
      # the value off, so electron-builder receives `.extraMetadata.version=X` as
      # a config *file path* and dies with ENOENT. electron-builder reads the app
      # version from package.json anyway; the committed value is a dev default.
      - name: Apply version from tag
        if: env.APP_VERSION != ''
        working-directory: frontend
        run: npm pkg set version=${{ env.APP_VERSION }}

      # Nothing is published: grab the .exe from this run's artifacts below and
      # install it by hand.
      - name: Build Windows installer
        working-directory: frontend
        run: npm run electron:build

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: cixis-windows-installer
          path: frontend/release/*.exe
          if-no-files-found: error
