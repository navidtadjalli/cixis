name: Build Windows EXE

on:
  push:
    tags:
      - "v*"        # build on version tags, e.g. v1.0.0
  workflow_dispatch: {}   # also allow manual runs from the Actions tab

permissions:
  contents: write   # needed to create/upload GitHub Releases for auto-update

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Build a Windows venv that electron-builder ships via extraResources.
      # main.cjs looks for backend/.venv/Scripts/python.exe on Windows.
      - name: Create Windows backend venv
        run: |
          py -3.12 -m venv backend\.venv
          backend\.venv\Scripts\python -m pip install --upgrade pip
          backend\.venv\Scripts\pip install -r backend\requirements.txt

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      # On a version tag: build AND publish to GitHub Releases so electron-updater
      # can find it (uploads the .exe plus the latest.yml feed). Manual/branch
      # runs just build, no publish.
      - name: Build Windows installer
        working-directory: frontend
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >-
          npm run electron:build --
          ${{ startsWith(github.ref, 'refs/tags/v') && '--publish always' || '--publish never' }}

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: cixis-windows-installer
          path: frontend/release/*.exe
          if-no-files-found: error
