name: Build Windows EXE

on:
  push:
    tags:
      - "v*"        # build on version tags, e.g. v1.0.0
  workflow_dispatch: {}   # also allow manual runs from the Actions tab

permissions:
  contents: write   # needed to create/upload GitHub Releases for auto-update

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      # Build the self-contained Windows Python bundle electron-builder ships:
      #   backend/python-embed/  -> standalone embeddable CPython (no install needed)
      #   backend/pylibs/        -> Django + deps as win_amd64 wheels
      # A venv is NOT used: it references a base Python by absolute path, so it is
      # not portable to a PC without Python installed. See the script header.
      - name: Build embedded Python backend bundle
        run: python backend\build_win_python.py

      # v1.2.3 -> 1.2.3. Fed to electron-builder as the app version so the
      # published latest.yml matches the tag — electron-updater compares against
      # that file, so a stale package.json version would hide the release from
      # installed clients. Manual runs leave it empty (no --publish either).
      - name: Derive version from tag
        shell: pwsh
        run: |
          $v = "${{ github.ref_name }}" -replace '^v',''
          if ("${{ github.ref }}" -notlike 'refs/tags/v*') { $v = '' }
          "APP_VERSION=$v" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      # On a version tag: build AND publish to GitHub Releases so electron-updater
      # can find it (uploads the .exe plus the latest.yml feed). Manual/branch
      # runs just build, no publish.
      - name: Build Windows installer
        working-directory: frontend
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >-
          npm run electron:build --
          ${{ env.APP_VERSION != '' && format('-c.extraMetadata.version={0}', env.APP_VERSION) || '' }}
          ${{ startsWith(github.ref, 'refs/tags/v') && '--publish always' || '--publish never' }}

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: cixis-windows-installer
          path: frontend/release/*.exe
          if-no-files-found: error
