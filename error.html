<!doctype html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>صفحه پیدا نشد</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #111316;
      --panel: #1b1f24;
      --text: #f6f2ea;
      --muted: #b8b0a3;
      --line: #343a42;
      --accent: #d9a441;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background: var(--bg);
      color: var(--text);
      font-family: Tahoma, Arial, sans-serif;
      line-height: 1.7;
    }

    .card {
      width: min(480px, 100%);
      padding: 40px 28px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--panel);
      text-align: center;
    }

    .mark {
      display: grid;
      place-items: center;
      width: 64px;
      height: 64px;
      margin: 0 auto 20px;
      border-radius: 16px;
      background: var(--accent);
      color: #1b1206;
      font-size: 2rem;
      font-weight: 900;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.4rem, 5vw, 1.9rem);
    }

    p {
      margin: 12px 0 0;
      color: var(--muted);
    }

    a {
      display: inline-block;
      margin-top: 26px;
      padding: 12px 22px;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: var(--text);
      font-weight: 700;
      text-decoration: none;
      transition: border-color 0.15s;
    }

    a:hover {
      border-color: var(--accent);
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="mark">Ç</div>
    <h1>این صفحه پیدا نشد</h1>
    <p>نشانی که دنبال آن بودید وجود ندارد یا جابه‌جا شده است.</p>
    <a href="/">رفتن به منو</a>
  </main>
</body>
</html>
