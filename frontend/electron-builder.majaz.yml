# مَجاز (Majaz) brand build. Same app as CiXiS (electron-builder.yml), only the
# identity differs: appId, product name, and icon.
#
# Built by: npm run electron:build:majaz  (sets BRAND=majaz so the UI theme +
# logo glyph are regenerated before vite build). CI: windows-build-majaz.yml on
# a `m-v*` tag.
appId: com.majaz.pos
productName: مَجاز

# No auto-update — see the same note in electron-builder.yml.
publish: null

directories:
  output: release

files:
  - package.json
  - dist/**/*
  - electron/**/*

extraResources:
  - from: ../menu.json
    to: menu.json
  # Loaded on demand by the setup screen's menu button, not at first launch.
  - from: ../menu.majaz.json
    to: menu.majaz.json
  - from: ../tables.json
    to: tables.json
  - from: ../backend
    to: backend
    filter:
      - "**/*"
      - "!.venv/**/*"
      - "!python-embed/**/*"
      - "!**/__pycache__/**"
      - "!**/*.py[cod]"
      - "!**/db.sqlite3"
      - "!**/*.sqlite3"
      - "!**/*.sqlite3-*"
      - "!**/backups/**"
      - "!**/*.bak"
      - "!**/*.backup"
      - "!**/*.log"
  - from: ../backend/python-embed
    to: python
    filter:
      - "**/*"

win:
  target: nsis
  icon: build/icon.majaz.ico

linux:
  target: AppImage
  category: Office
  icon: build/icon.majaz.png

nsis:
  oneClick: true
  perMachine: false
  createStartMenuShortcut: true
  createDesktopShortcut: true
  allowToChangeInstallationDirectory: false
  shortcutName: مَجاز
  include: build/installer.nsh
