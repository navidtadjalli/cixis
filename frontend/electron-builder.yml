appId: com.cixis.pos
productName: CiXiS

# Auto-update feed. electron-updater reads this to find new releases.
# Using GitHub Releases: publish a build with `electron-builder --publish always`
# (needs GH_TOKEN env). Replace owner/repo with the real repository.
# For a private/self-hosted feed instead, use:
#   provider: generic
#   url: https://your-server/cixis-updates/
publish:
  - provider: github
    owner: navidtadjalli
    repo: cixis

directories:
  # Keep electron-builder artifacts out of Vite's dist/ output.
  output: release

files:
  - package.json
  - dist/**/*
  - electron/**/*

extraResources:
  # Seed data read by seed_menu / seed_tables. The commands resolve these via
  # BASE_DIR.parent (= resources/), so they must ship next to the backend dir.
  - from: ../menu.json
    to: menu.json
  - from: ../tables.json
    to: tables.json
  # Ships Django source + its deps (pylibs/, built by backend/build-win-python.sh).
  # NOTE: .venv is intentionally excluded — a venv is not portable (it only
  # references a base Python by absolute path) and a Linux venv cannot run on
  # Windows. Deps live in pylibs/ as Windows wheels instead.
  - from: ../backend
    to: backend
    filter:
      - "**/*"
      - "!.venv/**/*"
      - "!python-embed/**/*"
      - "!**/__pycache__/**"
      - "!**/*.py[cod]"
      - "!**/db.sqlite3"
      - "!**/*.sqlite3"
      - "!**/*.sqlite3-*"
      - "!**/backups/**"
      - "!**/*.bak"
      - "!**/*.backup"
      - "!**/*.log"
  # Standalone embeddable Python for Windows — no separate Python install needed.
  # Built by backend/build-win-python.sh. Its python313._pth points at
  # ../backend + ../backend/pylibs so Django resolves from here.
  - from: ../backend/python-embed
    to: python
    filter:
      - "**/*"

win:
  target: nsis
  # Drop build/icon.ico here and set win.icon when an app icon is available.

linux:
  target: AppImage
  category: Office
  # Drop build/icon.png (512x512) here and set linux.icon for a custom icon.

nsis:
  oneClick: true
  perMachine: false
  createStartMenuShortcut: true
  createDesktopShortcut: true
  allowToChangeInstallationDirectory: false
  shortcutName: CiXiS
  include: build/installer.nsh
