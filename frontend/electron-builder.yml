appId: com.cixis.pos
productName: CiXiS

# No auto-update: the installer is downloaded from the CI run's artifacts and
# installed by hand. `null` rather than omitting the key — with no publish config
# electron-builder falls back to detecting a GitHub repo and writes an
# app-update.yml anyway ("file should be generated regardless of publish state").
publish: null

directories:
  # Keep electron-builder artifacts out of Vite's dist/ output.
  output: release

files:
  - package.json
  - dist/**/*
  - electron/**/*

extraResources:
  # Seed data read by seed_menu / seed_tables. The commands resolve these via
  # BASE_DIR.parent (= resources/), so they must ship next to the backend dir.
  - from: ../menu.json
    to: menu.json
  # Loaded on demand by the setup screen's menu button, not at first launch.
  - from: ../menu.majaz.json
    to: menu.majaz.json
  - from: ../tables.json
    to: tables.json
  # Ships Django source + its deps (pylibs/, built by backend/build-win-python.sh).
  # NOTE: .venv is intentionally excluded — a venv is not portable (it only
  # references a base Python by absolute path) and a Linux venv cannot run on
  # Windows. Deps live in pylibs/ as Windows wheels instead.
  - from: ../backend
    to: backend
    filter:
      - "**/*"
      - "!.venv/**/*"
      - "!python-embed/**/*"
      - "!**/__pycache__/**"
      - "!**/*.py[cod]"
      - "!**/db.sqlite3"
      - "!**/*.sqlite3"
      - "!**/*.sqlite3-*"
      - "!**/backups/**"
      - "!**/*.bak"
      - "!**/*.backup"
      - "!**/*.log"
  # Standalone embeddable Python for Windows — no separate Python install needed.
  # Built by backend/build-win-python.sh. Its python313._pth points at
  # ../backend + ../backend/pylibs so Django resolves from here.
  - from: ../backend/python-embed
    to: python
    filter:
      - "**/*"

win:
  target: nsis
  icon: build/icon.ico

linux:
  target: AppImage
  category: Office
  icon: build/icon.png

nsis:
  oneClick: true
  perMachine: false
  createStartMenuShortcut: true
  createDesktopShortcut: true
  allowToChangeInstallationDirectory: false
  shortcutName: CiXiS
  include: build/installer.nsh
